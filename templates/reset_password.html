<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | DataSense.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: var(--bg-main); color: var(--text-primary); 
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 400px);
        }
        .login-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
        .auth-container { 
            background: var(--card-bg); padding: 40px 50px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 100%; box-sizing: border-box;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .logo-box { margin-bottom: 30px; text-align: center; }
        .logo-box i { font-size: 2.8rem; color: #6366f1; margin-bottom: 10px; }
        .logo-box h2 { margin: 0; font-weight: 700; font-size: 2rem; letter-spacing: -0.5px; }
        .logo-box span.highlight { color: #ec4899; }
        .logo-box p { color: var(--text-secondary); font-size: 1.05rem; margin-top: 8px; opacity: 0.9; }
        
        form { margin-top: 10px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        .auth-container input { 
            width: 100%; padding: 14px 14px 14px 45px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); 
            color: var(--text-primary); box-sizing: border-box; font-family: 'Outfit', sans-serif;
            font-size: 1rem; transition: all 0.3s ease;
        }
        .auth-container input:focus {
            outline: none; border-color: #6366f1; background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .auth-container input:-webkit-autofill,
        .auth-container input:-webkit-autofill:hover, 
        .auth-container input:-webkit-autofill:focus, 
        .auth-container input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e1e2f inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        .auth-container button { 
            width: 100%; padding: 14px; margin-top: 15px; 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: all 0.3s ease; font-size: 1.05rem; font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .auth-container button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 12px; border-radius: 8px; font-size: 0.9em; margin-bottom: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="logo-box">
            <i class="fa-solid fa-chart-pie"></i>
            <h2>DataSense<span class="highlight">.AI</span></h2>
            <p>Create a new password</p>
        </div>
        <div class="auth-container">

        {% if error %}
            <div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" id="resetForm">
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPassword" name="password" placeholder="New Password" required autocomplete="new-password" oninput="checkPassword()">
            </div>
            <div style="text-align: left; font-size: 0.85rem; margin-top: -10px; margin-bottom: 15px; color: var(--text-secondary);" id="strengthHint">
                Password strength: <span style="font-weight: 600; opacity: 0.5;">Typing...</span>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm New Password" required autocomplete="new-password" oninput="checkPassword()">
            </div>
            <div style="text-align: left; font-size: 0.85rem; margin-top: -10px; margin-bottom: 15px; color: #ef4444; display: none;" id="matchHint">
                Passwords do not match
            </div>
            <button type="submit" id="submitBtn" disabled style="opacity: 0.5; cursor: not-allowed;">Update Password <i class="fa-solid fa-check" style="margin-left: 5px;"></i></button>
        </form>

        <script>
            function checkPassword() {
                const p = document.getElementById('newPassword').value;
                const c = document.getElementById('confirmPassword').value;
                const submitBtn = document.getElementById('submitBtn');
                const strength = document.getElementById('strengthHint');
                const match = document.getElementById('matchHint');
                
                let isStrong = false;
                if (p.length === 0) {
                    strength.innerHTML = 'Password strength: <span style="font-weight: 600; opacity: 0.5;">Typing...</span>';
                } else if (p.length < 8) {
                    strength.innerHTML = 'Password strength: <span style="font-weight: 600; color: #ef4444;">Too short (min 8)</span>';
                } else if (!/[A-Z]/.test(p) || !/[0-9]/.test(p)) {
                    strength.innerHTML = 'Password strength: <span style="font-weight: 600; color: #eab308;">Add numbers & capitals</span>';
                } else {
                    strength.innerHTML = 'Password strength: <span style="font-weight: 600; color: #10b981;">Strong</span>';
                    isStrong = true;
                }
                
                if (c.length > 0 && p !== c) {
                    match.style.display = 'block';
                } else {
                    match.style.display = 'none';
                }
                
                if (isStrong && p === c && p.length > 0) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.style.cursor = 'pointer';
                } else {
                    submitBtn.disabled = true;
                    submitBtn.style.opacity = '0.5';
                    submitBtn.style.cursor = 'not-allowed';
                }
            }
        </script>

        </div>
    </div>

</body>
</html>
